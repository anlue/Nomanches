    *{

      padding:0;

    html, body{

    }

    body{

      background:#0e0e0e;
      color:#fff;
      padding-bottom:170px;
    }

    .header{
      position:sticky;
      top:0;
      z-index:100;
      background:#000;
      border-bottom:3px solid #ff7a00;
      padding:18px 14px 14px;
      text-align:center;
    }

    .logo{
      font-size:32px;
      font-weight:bold;
      letter-spacing:1px;
    }

    .subtitle{
      font-size:14px;
      color:#bbb;
      margin-top:5px;
    }

    .top-actions{
      padding:12px 14px 0;
      display:grid;
      gap:10px;
    }

    .top-btn{
      display:block;
      width:100%;
      text-align:center;
      text-decoration:none;
      padding:14px;
      border-radius:14px;
      font-weight:bold;
      font-size:15px;
    }

    .pdf-btn{
      background:#1c1c1c;
      color:#ffb36b;
      border:1px solid rgba(255,122,0,.35);
    }

    .info-btn{
      background:#171717;
      color:#ddd;
      border:1px solid rgba(255,255,255,.06);
    }

    .search-wrap{
      padding:12px 14px 0;
    }

    .search{
      width:100%;
      border:none;
      outline:none;
      border-radius:14px;
      padding:14px;
      font-size:15px;
      background:#171717;
      color:#fff;
      border:1px solid rgba(255,255,255,.06);
    }

    .chips{
      display:flex;
      gap:10px;
      overflow-x:auto;
      padding:12px 14px 6px;
      scrollbar-width:none;
    }

    .chips::-webkit-scrollbar{
      display:none;
    }

    .chip{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      background:#1d1d1d;
      color:#ddd;
      white-space:nowrap;
      font-weight:bold;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.06);
    }

    .chip.active{
      background:#ff7a00;
      color:#111;
    }

    .menu-container{
      padding:8px 14px 20px;
    }

    .category{
      margin-bottom:22px;
    }

    .category-title{
      font-size:24px;
      font-weight:bold;
      color:#ff7a00;
      margin-bottom:6px;
    }

    .category-desc{
      color:#bdbdbd;
      font-size:13px;
      line-height:1.45;
      margin-bottom:12px;
    }

    .items-grid{
      display:grid;
      gap:12px;
    }

    .item{
      background:#171717;
      border:1px solid rgba(255,255,255,.06);
      border-left:4px solid #ff7a00;
      border-radius:16px;
      padding:14px;
      box-shadow:0 6px 16px rgba(0,0,0,.22);
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .item-name{
      font-size:18px;
      font-weight:bold;
      line-height:1.2;
    }

    .item-price{
      font-size:18px;
      font-weight:bold;
      color:#ffb36b;
      white-space:nowrap;
    }

    .item-desc{
      color:#cfcfcf;
      font-size:13px;
      line-height:1.4;
      margin-top:8px;
    }

    .controls{
      margin-top:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .qty-box{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .qty-btn{
      width:40px;
      height:40px;
      border:none;
      border-radius:12px;
      background:#ff7a00;
      color:#111;
      font-size:24px;
      font-weight:bold;
      cursor:pointer;
    }

    .qty-btn:active{
      transform:scale(.97);
    }

    .qty{
      min-width:24px;
      text-align:center;
      font-size:18px;
      font-weight:bold;
    }

    .subtotal{
      color:#dcdcdc;
      font-size:13px;
      text-align:right;
    }

    .empty{
      text-align:center;
      color:#9d9d9d;
      padding:30px 20px;
      font-size:14px;
    }

    .footer{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#000;
      border-top:2px solid #ff7a00;
      padding:14px;
      box-shadow:0 -4px 14px rgba(0,0,0,.35);
      z-index:120;
    }

    .summary-title{
      text-align:center;
      color:#bbb;
      font-size:14px;
      margin-bottom:8px;
    }

    .summary{
      background:#101010;
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;
      padding:10px;
      max-height:90px;
      overflow:auto;
      color:#ddd;
      font-size:13px;
      line-height:1.45;
      margin-bottom:10px;
    }

    .total{
      text-align:center;
      font-size:24px;
      font-weight:bold;
      color:#ff7a00;
      margin-bottom:10px;
    }

    .continue-btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:16px;
      background:#25D366;
      color:#fff;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }

    .continue-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .footer-note{
      text-align:center;
      color:#9c9c9c;
      font-size:12px;
      line-height:1.4;
      margin-top:8px;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.7);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:300;
      padding:0;
    }

    .modal-backdrop.show{
      display:flex;
    }

    .modal{
      width:100%;
      max-width:560px;
      background:#111;
      border-top-left-radius:24px;
      border-top-right-radius:24px;
      border-top:2px solid #ff7a00;
      padding:16px 14px 18px;
      box-shadow:0 -8px 24px rgba(0,0,0,.45);
      animation:subir .2s ease;
    }

    @keyframes subir{
      from{ transform:translateY(30px); opacity:.7; }
      to{ transform:translateY(0); opacity:1; }
    }

    .modal-handle{
      width:52px;
      height:5px;
      border-radius:999px;
      background:#555;
      margin:0 auto 14px;
    }

    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .modal-title{
      font-size:20px;
      font-weight:bold;
    }

      border:none;
      background:#1d1d1d;
      color:#fff;
      width:40px;
      height:40px;
      border-radius:12px;
      font-size:22px;
      cursor:pointer;
    }

    .customer-fields{
      display:grid;
      gap:10px;
      margin-bottom:12px;
    }

    .customer-fields input,
    .customer-fields textarea,
    .customer-fields select{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      padding:12px;
      font-size:14px;
      font-family:Arial, Helvetica, sans-serif;
      background:#fff;
      color:#111;
    }

    .customer-fields textarea{
      min-height:72px;
      resize:none;
    }

    .field-hidden{
      display:none;
    }

    .send-btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:16px;
      background:#25D366;
      color:#fff;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;

    }

      color:#9c9c9c;
      font-size:12px;
      line-height:1.4;
      margin-top:8px;
    }

      }

      .item-name{

      }

      }
    }
  </style>
</head>

          { id: "esp-bur-sup-premium", nombre: "Burrito Supremo (Premium)", precio: 11490, desc: "Triple proteína, doble cheddar, cebolla & cilantro, Doritos y aderezos." }

      },
      {

        descripcion: "Opciones calientes de la carta.",
        items: [
          { id: "te", nombre: "Té", precio: 1490, desc: "" },
          { id: "cafe", nombre: "Café", precio: 1490, desc: "" },
          { id: "cafe-leche", nombre: "Café con Leche", precio: 1690, desc: "" },
          { id: "te-leche", nombre: "Té con Leche", precio: 1690, desc: "" },
          { id: "capuccino", nombre: "Capuccino", precio: 1990, desc: "" },
          { id: "moka", nombre: "Doble Choca Moka", precio: 1990, desc: "" },
          { id: "latte", nombre: "Vainilla Latte", precio: 1990, desc: "" }
        ]
      },
      {
        id: "extras",
        nombre: "Extras",
        descripcion: "Agregados y complementos.",
        items: [
          { id: "ext-toppings-base", nombre: "Toppings base", precio: 990, desc: "Cebolla & cilantro, lechuga, piña, tomate o arroz." },
          { id: "ext-toppings-pal-maiz", nombre: "Toppings Palta / Maíz", precio: 1490, desc: "Palta o maíz." },
          { id: "ext-salsas", nombre: "Salsas", precio: 790, desc: "Agria, palta, picante, manjar, mayo chipotle, mayonesa Kraft, mostaza Heinz o ketchup Heinz." },
          { id: "ext-guacamole", nombre: "Guacamole", precio: 2490, desc: "" },
          { id: "ext-queso-gran", nombre: "Queso Mantecoso Granulado", precio: 1490, desc: "" },
          { id: "ext-queso-fund", nombre: "Queso Fundido", precio: 1990, desc: "" },
          { id: "ext-tajin", nombre: "Tajín", precio: 1190, desc: "3 sobres de 1 gr." },
          { id: "ext-prot-carnes", nombre: "Proteína Carnes", precio: 1590, desc: "Al Pastor, Bistec o Pollo." },
          { id: "ext-prot-veggie", nombre: "Proteína Veggie", precio: 1890, desc: "Champiñón, Frijol o Maíz." },
          { id: "ext-prot-premium", nombre: "Proteína Premium", precio: 2090, desc: "Birria, Chorizo o Tocino." }
        ]
      }
    ];

    const chipsContainer = document.getElementById("chips");
    const menuContainer = document.getElementById("menuContainer");
    const searchInput = document.getElementById("searchInput");
    const summary = document.getElementById("summary");
    const totalEl = document.getElementById("total");
    const continueBtn = document.getElementById("continueBtn");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const sendBtn = document.getElementById("sendBtn");
    const nombreCliente = document.getElementById("nombreCliente");
    const tipoEntrega = document.getElementById("tipoEntrega");
    const direccionWrap = document.getElementById("direccionWrap");
    const direccionCliente = document.getElementById("direccionCliente");
    const comentarios = document.getElementById("comentarios");

    const carrito = {};
    let categoriaActiva = "todas";

    function formatoCLP(valor){
      return "$" + valor.toLocaleString("es-CL");
    }

    function crearChips(){
      const lista = [{ id: "todas", nombre: "Todas" }, ...categorias.map(c => ({ id: c.id, nombre: c.nombre }))];
      chipsContainer.innerHTML = "";

      lista.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "chip" + (cat.id === categoriaActiva ? " active" : "");
        btn.textContent = cat.nombre;
        btn.onclick = () => {
          categoriaActiva = cat.id;
          crearChips();
          renderMenu();
        };
        chipsContainer.appendChild(btn);
      });
    }

    function itemCoincideBusqueda(item, texto){
      if(!texto) return true;
      const base = (item.nombre + " " + item.desc).toLowerCase();
      return base.includes(texto.toLowerCase());
    }

    function renderMenu(){
      const filtro = searchInput.value.trim().toLowerCase();
      menuContainer.innerHTML = "";
      let totalResultados = 0;

      categorias.forEach(categoria => {
        if(categoriaActiva !== "todas" && categoria.id !== categoriaActiva){
          return;
        }

        const itemsFiltrados = categoria.items.filter(item => itemCoincideBusqueda(item, filtro));

        if(itemsFiltrados.length === 0){
          return;
        }

        totalResultados += itemsFiltrados.length;

        const section = document.createElement("section");
        section.className = "category";
        section.innerHTML = `
          <div class="category-title">${categoria.nombre}</div>
          <div class="category-desc">${categoria.descripcion}</div>
          <div class="items-grid"></div>
        `;

        const grid = section.querySelector(".items-grid");

        itemsFiltrados.forEach(item => {
          const qty = carrito[item.id] || 0;
          const subtotal = qty * item.precio;

          const card = document.createElement("div");
          card.className = "item";
          card.innerHTML = `
            <div class="item-top">
              <div class="item-name">${item.nombre}</div>
              <div class="item-price">${formatoCLP(item.precio)}</div>
            </div>
            <div class="item-desc">${item.desc || " "}</div>
            <div class="controls">
              <div class="qty-box">
                <button class="qty-btn minus">-</button>
                <div class="qty">${qty}</div>
                <button class="qty-btn plus">+</button>
              </div>
              <div class="subtotal">Subtotal: <span>${formatoCLP(subtotal)}</span></div>
            </div>
          `;

          const minus = card.querySelector(".minus");
          const plus = card.querySelector(".plus");

          minus.onclick = () => {
            const actual = carrito[item.id] || 0;
            if(actual > 0){
              carrito[item.id] = actual - 1;
              if(carrito[item.id] === 0){
                delete carrito[item.id];
              }
              renderMenu();
              actualizarResumen();
            }
          };

          plus.onclick = () => {
            const actual = carrito[item.id] || 0;
            carrito[item.id] = actual + 1;
            renderMenu();
            actualizarResumen();
          };

          grid.appendChild(card);
        });

        menuContainer.appendChild(section);
      });

      if(totalResultados === 0){
        menuContainer.innerHTML = `<div class="empty">No se encontraron productos con esa búsqueda.</div>`;
      }
    }

    function obtenerTodosLosItems(){
      return categorias.flatMap(cat =>
        cat.items.map(item => ({
          ...item,
          categoria: cat.nombre
        }))
      );
    }

    function actualizarResumen(){
      const allItems = obtenerTodosLosItems();
      let total = 0;
      let lineas = [];

      allItems.forEach(item => {
        const qty = carrito[item.id] || 0;
        if(qty > 0){
          const subtotal = qty * item.precio;
          total += subtotal;
          lineas.push(`• ${qty} x ${item.nombre} = ${formatoCLP(subtotal)}`);
        }
      });

      if(lineas.length === 0){
        summary.textContent = "Aún no agregas productos.";
        totalEl.textContent = "$0";
        continueBtn.disabled = true;
      } else {
        summary.innerHTML = lineas.join("<br>");
        totalEl.textContent = formatoCLP(total);
        continueBtn.disabled = false;
      }
    }

    function actualizarVisibilidadDireccion(){
      const esDelivery = tipoEntrega.value === "Delivery";
      direccionWrap.classList.toggle("field-hidden", !esDelivery);

      if(!esDelivery){
        direccionCliente.value = "";
      }
    }

    function construirMensaje(){
      const allItems = obtenerTodosLosItems();
      let total = 0;
      let pedido = [];

      allItems.forEach(item => {
        const qty = carrito[item.id] || 0;
        if(qty > 0){
          const subtotal = qty * item.precio;
          total += subtotal;
          pedido.push(`${qty} x ${item.nombre} (${formatoCLP(subtotal)})`);
        }
      });

      if(pedido.length === 0){
        return "";
      }

      let mensaje = "Hola, quiero hacer este pedido en No Manches:\n\n";

      pedido.forEach(linea => {
        mensaje += `• ${linea}\n`;
      });

      mensaje += `\nTotal: ${formatoCLP(total)}`;

      if(nombreCliente.value.trim()){
        mensaje += `\nNombre: ${nombreCliente.value.trim()}`;
      }

      if(tipoEntrega.value){
        mensaje += `\nTipo de entrega: ${tipoEntrega.value}`;
      }

      if(tipoEntrega.value === "Delivery" && direccionCliente.value.trim()){
        mensaje += `\nDirección: ${direccionCliente.value.trim()}`;
      }

      if(comentarios.value.trim()){
        mensaje += `\nComentarios: ${comentarios.value.trim()}`;
      }

      mensaje += "\n\nEnviado desde el menú web.";
      return mensaje;
    }

    continueBtn.addEventListener("click", () => {
      modalBackdrop.classList.add("show");
      actualizarVisibilidadDireccion();
    });

    closeModalBtn.addEventListener("click", () => {
      modalBackdrop.classList.remove("show");
    });

    modalBackdrop.addEventListener("click", (e) => {
      if(e.target === modalBackdrop){
        modalBackdrop.classList.remove("show");
      }
    });

    tipoEntrega.addEventListener("change", actualizarVisibilidadDireccion);

    sendBtn.addEventListener("click", () => {
      const mensaje = construirMensaje();
      if(!mensaje) return;
      const url = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensaje)}`;
      window.location.href = url;
    });

    searchInput.addEventListener("input", renderMenu);

    crearChips();
    renderMenu();
    actualizarResumen();
    actualizarVisibilidadDireccion();
  </script>
