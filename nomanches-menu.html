<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Manches - Menú</title>
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#111;
      color:#fff;
    }

    .header{
      background:#000;
      border-bottom:3px solid #ff7a00;
      padding:18px 16px;
      text-align:center;
      font-size:26px;
      font-weight:bold;
      letter-spacing:1px;
    }

    .logo-wrap{
      padding:18px 16px 10px;
      text-align:center;
      background:#111;
    }

    .logo-circle{
      width:120px;
      height:120px;
      margin:0 auto 12px;
      border-radius:50%;
      background:#000;
      border:3px solid #fff;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:28px;
      font-weight:bold;
      line-height:1.05;
      color:#fff;
    }

    .sub{
      color:#ddd;
      font-size:14px;
    }

    .pdf-container{
      padding:14px;
      padding-bottom:120px;
    }

    .pdf-frame{
      width:100%;
      height:72vh;
      border:none;
      border-radius:16px;
      background:#fff;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }

    .footer{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#000;
      border-top:2px solid #ff7a00;
      padding:12px;
      box-shadow:0 -4px 12px rgba(0,0,0,.35);
    }

    .wa-btn, .drive-btn{
      display:block;
      width:100%;
      text-align:center;
      text-decoration:none;
      padding:14px;
      border-radius:12px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .wa-btn{
      background:#25D366;
      color:#fff;
    }

    .drive-btn{
      background:#ff7a00;
      color:#111;
      margin-bottom:0;
    }

    .note{
      text-align:center;
      color:#bdbdbd;
      font-size:12px;
      margin-top:8px;
    }
  </style>
</head>
<body>

  <div class="header">NO MANCHES 🌮</div>

  <div class="logo-wrap">
    <div class="logo-circle">No<br>Manches</div>
    <div class="sub">Revisa el menu y a disfrutar nomanchero</div>
  </div>

  <div class="pdf-container">
    <iframe
      class="pdf-frame"
      src="https://drive.google.com/file/d/15OeRjRlghJOhtpZ0L2uSOp7AvH9iU3N0/preview"
      allow="autoplay">
    </iframe>
  </div>

  <div class="footer">
    <a
      class="wa-btn"
      href="https://wa.me/56934234266?text=Hola,%20quiero%20hacer%20un%20pedido"
      target="_blank">
      Pedir por WhatsApp
    </a>

    <a
      class="drive-btn"
      href="https://drive.google.com/file/d/15OeRjRlghJOhtpZ0L2uSOp7AvH9iU3N0/view"
      target="_blank">
      Abrir menú completo
    </a>

    <div class="note">Si el menu no carga hablanos y te lo enviamos por whatsapp.</div>
  </div>

</body>
</html>
